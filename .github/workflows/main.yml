name: Test Workflow

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm   #speed-up npm installation

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: react-artifact     #creating artifact file 
        uses: actions/upload-artifact@v4
        with:
          name: react-build   # will use in deployment
          path: dist/

  test:             #added info job
    needs: build                    # execute after build job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install dependencies
        run: npm install

     # - name: run_unit_test
    #    run: npm test
        
      - name: curr_dir
        run: pwd

      - name: check_date
        run: date

      - name: check_node_version
        run: node -v
       
  deploy:      #new job deployment
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact    #taking artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
    
      - name: print_successful_deployment
        run: echo "Deployment successfully done"
    
  



        

      
